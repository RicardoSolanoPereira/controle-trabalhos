# .streamlit/config.toml

[theme]
base = "light"

# Neutro suave (não azul forte, não preto pesado)
primaryColor = "#475569"  # slate-600

backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"  # slate-50

textColor = "#0f172a"          # slate-900
secondaryTextColor = "#64748b" # slate-500

font = "sans serif"