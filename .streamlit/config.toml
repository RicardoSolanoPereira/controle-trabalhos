# .streamlit/config.toml
[theme]
base="light"

# Tom executivo (bom para botões/links)
primaryColor="#111827"

# Fundo branco limpo
backgroundColor="#ffffff"

# Fundo secundário levemente acinzentado (sidebar/containers)
secondaryBackgroundColor="#f4f6f8"

# Texto com bom contraste
textColor="#0f172a"

font="sans serif"